<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | Broussard Consulting Group</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='12' fill='%230B1D3A'/><text x='50' y='68' font-size='60' font-weight='bold' font-family='sans-serif' fill='%23C8A951' text-anchor='middle'>B</text></svg>">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0B1D3A;
      color: #FFFFFF;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .container { max-width: 520px; }
    .error-code {
      font-size: 6rem;
      font-weight: 800;
      color: #C8A951;
      line-height: 1;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 12px;
    }
    p {
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.6);
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .btn {
      display: inline-block;
      padding: 14px 32px;
      border-radius: 6px;
      font-size: 0.95rem;
      font-weight: 600;
      text-decoration: none;
      background: #C8A951;
      color: #0B1D3A;
      transition: 0.3s ease;
    }
    .btn:hover {
      background: #E0C97A;
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(200, 169, 81, 0.3);
    }
    .logo {
      margin-top: 48px;
      font-size: 0.85rem;
      font-weight: 800;
      letter-spacing: 2px;
      color: rgba(255, 255, 255, 0.3);
    }
    .logo span { color: rgba(200, 169, 81, 0.4); }
  </style>
</head>
<body>
  <div class="container">
    <div class="error-code">404</div>
    <h1>Page Not Found</h1>
    <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
    <a href="/" class="btn">Back to Home</a>
    <div class="logo">BROUSSARD<span> CONSULTING</span></div>
  </div>
</body>
</html>
